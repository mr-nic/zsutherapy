<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Zsu Therapy · Mobile prototype</title>
<meta name="description" content="Clickable mobile prototype for the Zsu Therapy website redesign. Tweakable type, accent strategy, density, leaf motifs.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* =============================================================
   Zsu Therapy — Prototype CSS
   Warm & crafted · mobile + desktop · tweakable
   ============================================================= */

@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Inter:wght@400;500;600&family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  /* ——— Paper / ink — overridden by tweaks ——— */
  --paper:        #faf8f4;
  --paper-warm:   #f3eee4;
  --paper-deep:   #ece5d6;
  --ink:          #1a1a1a;
  --ink-soft:     #2a2a26;
  --muted:        #6b6862;
  --border:       #e0dbd4;
  --border-soft:  #eee9e1;

  /* ——— Brand & treatment accents ——— */
  --c-teal:   #4db0db;
  --c-green:  #6db43b;
  --c-orange: #e8821e;
  --c-purple: #493177;
  --c-red:    #d83d3a;
  --c-yellow: #b8a800;
  --c-mag:    #a13a78;

  --accent: var(--c-teal);
  --accent-tint: color-mix(in oklab, var(--accent) 10%, var(--paper));
  --accent-tint-soft: color-mix(in oklab, var(--accent) 5%, var(--paper));

  /* ——— Type families — overridden by tweaks ——— */
  --f-serif: 'Lora', 'Iowan Old Style', Georgia, serif;
  --f-sans:  'DM Sans', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  --f-mono:  'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* ——— Scale (density-tweakable via --d) ——— */
  --d: 1;
  --s-1: calc(4px * var(--d));
  --s-2: calc(8px * var(--d));
  --s-3: calc(12px * var(--d));
  --s-4: calc(16px * var(--d));
  --s-5: calc(20px * var(--d));
  --s-6: calc(24px * var(--d));
  --s-7: calc(32px * var(--d));
  --s-8: calc(40px * var(--d));
  --s-9: calc(56px * var(--d));
  --s-10: calc(72px * var(--d));
  --s-11: calc(96px * var(--d));
  --s-12: calc(128px * var(--d));

  --r-sm: 4px; --r-md: 8px; --r-lg: 14px; --r-xl: 24px; --r-pill: 999px;

  /* ——— Leaf-decoration density (visual opacity, set via tweak) ——— */
  --leaf-op: 0.5;
}

/* ——— Tweak: heading font ——— */
[data-tweak-heading="lora"]       { --f-serif: 'Lora', Georgia, serif; }
[data-tweak-heading="fraunces"]   { --f-serif: 'Fraunces', 'Iowan Old Style', Georgia, serif; }
[data-tweak-heading="cormorant"]  { --f-serif: 'Cormorant Garamond', 'Iowan Old Style', Georgia, serif; }

/* ——— Tweak: body font ——— */
[data-tweak-body="dm"]        { --f-sans: 'DM Sans', -apple-system, sans-serif; }
[data-tweak-body="inter"]     { --f-sans: 'Inter', -apple-system, sans-serif; }
[data-tweak-body="atkinson"]  { --f-sans: 'Atkinson Hyperlegible', -apple-system, sans-serif; }

/* ——— Tweak: background warmth ——— */
[data-tweak-warmth="warm"]    { --paper: #faf8f4; --paper-warm: #f3eee4; --paper-deep: #ece5d6; }
[data-tweak-warmth="neutral"] { --paper: #f7f6f3; --paper-warm: #efece6; --paper-deep: #e7e3d9; }
[data-tweak-warmth="cool"]    { --paper: #f6f7f4; --paper-warm: #eceee6; --paper-deep: #e1e4da; }

/* ——— Tweak: density ——— */
[data-tweak-density="airy"]      { --d: 1.15; }
[data-tweak-density="standard"]  { --d: 1; }
[data-tweak-density="compact"]   { --d: 0.85; }

/* ——— Tweak: corner radius ——— */
[data-tweak-radius="sharp"] { --r-sm: 0; --r-md: 0; --r-lg: 0; --r-xl: 0; --r-pill: 0; }
[data-tweak-radius="soft"]  { --r-sm: 4px; --r-md: 8px; --r-lg: 14px; --r-xl: 24px; --r-pill: 999px; }
[data-tweak-radius="round"] { --r-sm: 8px; --r-md: 14px; --r-lg: 22px; --r-xl: 36px; --r-pill: 999px; }

/* ——— Tweak: leaf decoration density ——— */
[data-tweak-leaves="subtle"]      { --leaf-op: 0.28; }
[data-tweak-leaves="medium"]      { --leaf-op: 0.55; }
[data-tweak-leaves="pronounced"]  { --leaf-op: 0.85; }

/* ——— Tweak: italic accents ——— */
[data-tweak-italics="off"] h1 em,
[data-tweak-italics="off"] h2 em,
[data-tweak-italics="off"] h3 em { font-style: normal; }

/* ——— Tweak: caps eyebrows ——— */
[data-tweak-eyebrows="off"] .eyebrow { display: none; }

/* ============================================================
   BASE
   ============================================================ */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--f-sans);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
img, svg { display: block; max-width: 100%; }
button { font: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }

/* ============================================================
   TYPE
   ============================================================ */
h1, h2, h3, h4 {
  font-family: var(--f-serif);
  font-weight: 500;
  letter-spacing: -0.005em;
  color: var(--ink);
  margin: 0;
  line-height: 1.08;
  text-wrap: pretty;
}
h1 em, h2 em, h3 em { font-style: italic; color: var(--ink-soft); font-weight: 400; }

p { margin: 0; color: var(--ink-soft); }
.lede {
  font-family: var(--f-serif);
  font-size: 19px;
  line-height: 1.5;
  color: var(--ink-soft);
  font-style: italic;
  font-weight: 400;
}
.muted { color: var(--muted); }
.tabular { font-variant-numeric: tabular-nums; }

.eyebrow {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow .dot {
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  display: inline-block;
}
.eyebrow .num {
  color: var(--accent);
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  border-radius: var(--r-pill);
  font-family: var(--f-sans);
  font-size: 15px;
  font-weight: 500;
  border: 1px solid transparent;
  transition: transform .12s ease, background .15s, color .15s, border-color .15s;
  white-space: nowrap;
  cursor: pointer;
  text-decoration: none;
}
.btn--primary { background: var(--ink); color: var(--paper); }
.btn--primary:hover { background: #000; transform: translateY(-1px); }
.btn--ghost { background: transparent; color: var(--ink); border-color: var(--ink); }
.btn--ghost:hover { background: var(--ink); color: var(--paper); }
.btn--accent { background: var(--accent); color: white; }
.btn--quiet {
  background: transparent;
  color: var(--ink);
  padding: 0;
  border-radius: 0;
  border-bottom: 1px solid currentColor;
  padding-bottom: 4px;
}
.btn--quiet:hover { color: var(--accent); }
.btn .arrow { transition: transform .15s; }
.btn:hover .arrow { transform: translateX(3px); }
.btn--sm { padding: 10px 16px; font-size: 13px; }

/* ============================================================
   ACCENT STRATEGY VARIANTS
   --tweak-accent-strategy: rule | leaf | tinted
   ============================================================ */

/* Default rule strategy */
.t-stripe {
  height: 3px;
  background: var(--accent);
  width: 100%;
}
.t-stripe--top {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}

.t-leaf {
  width: 24px;
  height: 24px;
  color: var(--accent);
  flex: 0 0 auto;
}

.t-tint {
  background: var(--accent-tint);
}

[data-tweak-accent="rule"] .accent-leaf { display: none; }
[data-tweak-accent="rule"] .accent-tint { background: var(--paper); }

[data-tweak-accent="leaf"] .accent-rule { display: none; }
[data-tweak-accent="leaf"] .accent-tint { background: var(--paper); }

[data-tweak-accent="tinted"] .accent-rule { display: none; }
[data-tweak-accent="tinted"] .accent-leaf { display: none; }
[data-tweak-accent="tinted"] .accent-tint { background: var(--accent-tint); }

/* ============================================================
   LEAF DECORATIONS — large scattered botanical illustrations
   ============================================================ */
.leaf-deco {
  position: absolute;
  pointer-events: none;
  opacity: var(--leaf-op);
  color: var(--ink);
}
.leaf-deco svg { width: 100%; height: 100%; }
.leaf-deco--accent { color: var(--accent); }

/* ============================================================
   CARDS / TREATMENT CARDS
   ============================================================ */
.card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--s-7);
  transition: border-color .15s, transform .15s;
  position: relative;
  overflow: hidden;
}

.t-card {
  position: relative;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--s-7);
  display: flex;
  flex-direction: column;
  gap: var(--s-4);
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  transition: border-color .2s, transform .2s;
  isolation: isolate;
}
.t-card:hover {
  border-color: var(--ink);
  transform: translateY(-2px);
}
.t-card .accent-rule {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--c, var(--accent));
}
.t-card .accent-leaf {
  position: absolute;
  top: var(--s-5);
  right: var(--s-5);
  width: 28px;
  height: 28px;
  color: var(--c, var(--accent));
}
.t-card.accent-tint { background: color-mix(in oklab, var(--c, var(--accent)) 6%, var(--paper)); }
[data-tweak-accent="tinted"] .t-card.accent-tint-host { background: color-mix(in oklab, var(--c, var(--accent)) 6%, var(--paper)); }

.t-card__title {
  font-family: var(--f-serif);
  font-size: 24px;
  font-weight: 500;
  line-height: 1.15;
}
.t-card__chip {
  display: inline-flex; gap: 6px; align-items: center;
  font-family: var(--f-mono); font-size: 10px;
  color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
  margin-top: 4px;
}
.t-card__chip-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--c, var(--accent));
  display: inline-block;
}
.t-card__desc { color: var(--ink-soft); font-size: 14.5px; line-height: 1.55; }
.t-card__meta {
  margin-top: auto;
  display: flex; align-items: center; gap: var(--s-4);
  font-family: var(--f-mono); font-size: 12px; color: var(--muted);
  padding-top: var(--s-4);
  border-top: 1px solid var(--border-soft);
  flex-wrap: wrap;
}
.t-card__price { color: var(--ink); font-weight: 500; }
.t-card__link {
  margin-left: auto;
  display: inline-flex; align-items: center; gap: 4px;
  color: var(--ink); font-family: var(--f-sans);
  font-size: 13px; font-weight: 500;
}

/* ============================================================
   IMAGE PLACEHOLDERS (no stock photo)
   ============================================================ */
.imgph {
  position: relative;
  background-color: var(--paper-warm);
  background-image: repeating-linear-gradient(
    45deg,
    transparent 0,
    transparent 14px,
    rgba(120, 95, 60, 0.04) 14px,
    rgba(120, 95, 60, 0.04) 15px
  );
  border-radius: var(--r-lg);
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  overflow: hidden;
  text-align: center;
  padding: 16px;
}
.imgph::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 1px solid var(--border);
  border-radius: inherit;
  pointer-events: none;
}
.imgph__label {
  position: relative;
  z-index: 2;
  max-width: 80%;
}

/* "Leaf illustration" placeholder — botanical illustration block */
.leaf-ill {
  position: relative;
  background: linear-gradient(135deg, var(--paper-warm) 0%, var(--paper-deep) 100%);
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.leaf-ill__svg {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  color: var(--ink);
  opacity: 0.18;
}
.leaf-ill__label {
  position: absolute;
  left: 16px; bottom: 16px;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--paper);
  padding: 4px 8px;
  border-radius: var(--r-pill);
  border: 1px solid var(--border);
}

/* ============================================================
   QUOTES
   ============================================================ */
.quote {
  font-family: var(--f-serif);
  font-size: 22px;
  line-height: 1.35;
  color: var(--ink);
  font-style: italic;
  font-weight: 400;
  text-wrap: balance;
}
.quote::before { content: '“'; color: var(--accent); margin-right: 4px; }
.quote::after  { content: '”'; color: var(--accent); margin-left: 4px; }
.quote__cite {
  display: block;
  margin-top: 16px;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  font-style: normal;
}

/* ============================================================
   FAQ ACCORDION
   ============================================================ */
.faq { border-top: 1px solid var(--border); }
.faq__item { border-bottom: 1px solid var(--border); }
.faq__q {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  padding: var(--s-6) 0;
  background: none; border: 0; text-align: left;
  font-family: var(--f-serif); font-size: 19px; font-weight: 500; color: var(--ink);
  line-height: 1.3;
}
.faq__q .plus {
  font-family: var(--f-sans);
  font-weight: 300;
  font-size: 24px;
  color: var(--accent);
  flex: 0 0 auto;
  transition: transform .2s;
}
.faq__item--open .faq__q .plus { transform: rotate(45deg); }
.faq__a {
  padding: 0 0 var(--s-6);
  color: var(--ink-soft);
  max-width: 70ch;
  font-size: 15px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.faq__a ul { padding-left: 18px; margin: 4px 0; }
.faq__a li { margin: 4px 0; }
.faq__item:not(.faq__item--open) .faq__a { display: none; }

/* ============================================================
   PRICING / HOURS ROWS
   ============================================================ */
.price-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 16px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border-soft);
  align-items: baseline;
}
.price-row:last-child { border-bottom: 0; }
.price-row__name { font-family: var(--f-serif); font-size: 18px; }
.price-row__len  { font-family: var(--f-mono); font-size: 13px; color: var(--muted); }
.price-row__amt  { font-family: var(--f-mono); font-size: 16px; font-weight: 500; color: var(--ink); }

.hours-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 24px;
  padding: 13px 0;
  border-bottom: 1px solid var(--border-soft);
  align-items: baseline;
  font-size: 15px;
}
.hours-row:last-child { border-bottom: 0; }
.hours-row__day { font-family: var(--f-serif); font-size: 17px; }
.hours-row__time { font-family: var(--f-mono); font-size: 13px; color: var(--ink-soft); }
.hours-row--closed .hours-row__time { color: var(--muted); }
.hours-row--closed .hours-row__day { color: var(--muted); }

/* ============================================================
   PILL / TAG
   ============================================================ */
.tag {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-soft);
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  background: var(--paper);
}

/* ============================================================
   LISTS
   ============================================================ */
.list-checks { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
.list-checks li { padding-left: 28px; position: relative; color: var(--ink-soft); }
.list-checks li::before {
  content: '';
  position: absolute; left: 0; top: 9px;
  width: 12px; height: 6px;
  border-left: 1.5px solid var(--accent);
  border-bottom: 1.5px solid var(--accent);
  transform: rotate(-45deg);
}

/* ============================================================
   FORMS
   ============================================================ */
.field {
  display: block;
  width: 100%;
  padding: 14px 16px;
  font: inherit;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  color: var(--ink);
}
.field:focus { border-color: var(--accent); outline: none; }
textarea.field { min-height: 120px; resize: vertical; font-family: inherit; }

.newsletter {
  display: flex; gap: 8px;
  padding: 4px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  max-width: 380px;
}
.newsletter input {
  flex: 1; border: 0; background: transparent; padding: 8px 14px;
  font: inherit; outline: none; color: var(--ink);
}
.newsletter button {
  border: 0; background: var(--ink); color: var(--paper);
  padding: 10px 18px; border-radius: var(--r-pill);
  font-size: 13px; font-weight: 500;
}

/* ============================================================
   TREATMENT ACCENT WIRING
   ============================================================ */
[data-accent="teal"]   { --accent: var(--c-teal); --accent-tint: color-mix(in oklab, var(--c-teal) 10%, var(--paper)); }
[data-accent="green"]  { --accent: var(--c-green); --accent-tint: color-mix(in oklab, var(--c-green) 10%, var(--paper)); }
[data-accent="orange"] { --accent: var(--c-orange); --accent-tint: color-mix(in oklab, var(--c-orange) 10%, var(--paper)); }
[data-accent="purple"] { --accent: var(--c-purple); --accent-tint: color-mix(in oklab, var(--c-purple) 10%, var(--paper)); }
[data-accent="red"]    { --accent: var(--c-red); --accent-tint: color-mix(in oklab, var(--c-red) 10%, var(--paper)); }
[data-accent="yellow"] { --accent: var(--c-yellow); --accent-tint: color-mix(in oklab, var(--c-yellow) 10%, var(--paper)); }
[data-accent="mag"]    { --accent: var(--c-mag); --accent-tint: color-mix(in oklab, var(--c-mag) 10%, var(--paper)); }

/* ============================================================
   PROTOTYPE-LEVEL: device wrapper + chrome
   ============================================================ */

/* Both shells use a content container */
.proto-page {
  background: var(--paper);
  color: var(--ink);
  min-height: 100%;
  position: relative;
}
.proto-shell {
  background: var(--paper);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  position: relative;
}

/* Site header */
.site-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in oklab, var(--paper) 92%, transparent);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-soft);
}
.site-header__inner {
  display: flex;
  align-items: center;
  gap: 16px;
}
.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: inherit;
}
.brand__mark { flex: 0 0 auto; }
.brand__wordmark {
  font-family: var(--f-serif);
  font-size: 19px;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.brand__wordmark em {
  display: block;
  font-style: normal;
  font-family: var(--f-mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  margin-top: 2px;
}

.site-nav { display: flex; gap: var(--s-6); }
.site-nav a {
  font-size: 14px;
  color: var(--ink-soft);
  position: relative;
  padding-bottom: 2px;
}
.site-nav a:hover, .site-nav a.current { color: var(--accent); }
.site-nav a.current::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -3px;
  height: 2px;
  background: var(--accent);
}

.menu-toggle {
  display: inline-flex; align-items: center; justify-content: center;
  width: 40px; height: 40px;
  border-radius: var(--r-md);
  background: transparent;
  border: 1px solid var(--border);
}

/* ============================================================
   MOBILE MODE OVERRIDES
   ============================================================ */
body.mode-mobile {
  font-size: 15px;
}
body.mode-mobile .site-header__inner {
  height: 56px;
  padding: 0 16px;

    return `<svg class="brand__mark" width="${size}" height="${size}" viewBox="0 0 100 100" aria-hidden="true">

  }
  if (variant === 'moderate') {
    // tighter, smaller petals
    return `<svg class="brand__mark" width="${size}" height="${size}" viewBox="0 0 160 160" aria-hidden="true">
      <g transform="translate(80 80)">

      </g>

  }
  // gentle = current logo, just cleaner linework
  return `<svg class="brand__mark" width="${size}" height="${size}" viewBox="0 0 160 160" aria-hidden="true">
    <g transform="translate(80 80)">
      ${palette.map((c,i) => `<g transform="rotate(${i*360/7})"><path d="M0 -52 Q15 -38 14 -18 Q0 -4 -14 -18 Q-15 -38 0 -52z" fill="${c}"/></g>`).join('')}

}

            <div class="eyebrow"><span class="num">01</span><span>About the service</span></div>
            <h3 style="margin-top: 12px; font-size: 26px;">Caring and effective <em>since 2010.</em></h3>
            <p style="margin-top: 16px; line-height: 1.7;">Zsu Therapy has been providing caring and effective massage, reflexology and aromatherapy treatments since 2010.</p>
            <p style="margin-top: 14px; line-height: 1.7;">Zsu always aims for creating a healing and safe environment where people can unwind, release tension and forget about the outside world — and leave feeling calm and recharged. Client feedback is very important and encouraged during a session to make sure everyone leaves satisfied.</p>
            <p style="margin-top: 14px; font-family: var(--f-serif); font-style: italic; font-size: 18px; line-height: 1.5; color: var(--ink);">

          <div>
            <div class="eyebrow"><span class="num">02</span><span>About Zsu</span></div>
            <h2 style="margin-top: 14px; max-width: 18ch;">From nursing school <em>to the healing power</em> of natural therapies.</h2>
          </div>
        </div>
        <div style="max-width: 64ch;">
          <p style="font-size: 17px; line-height: 1.7; margin-bottom: 18px;">
            From a young age, curious about the mysteries of the human body and mind, I was initially drawn to medical studies and entered nursing school.
          </p>
          <p style="font-size: 17px; line-height: 1.7; margin-bottom: 18px;">
            Meanwhile, I was rapidly discovering holistic and natural therapies and I came to realise that nothing exists in isolation — and how our bodies and minds influence each other.
          </p>
          <p style="font-size: 17px; line-height: 1.7; margin-bottom: 18px;">
            That's why massage therapy and reflexology are so incredible. They work on many different levels, be that physical or emotional. People who receive regular treatments report magnificent changes in their wellbeing.
          </p>
          <p style="font-size: 17px; line-height: 1.7; font-family: var(--f-serif); font-style: italic; color: var(--ink);">
            Fascinated with the healing power of natural therapies so much that I keep finding new training opportunities irresistible.
          </p>
          <p style="margin-top: 18px; font-family: var(--f-mono); font-size: 12px; color: var(--muted); letter-spacing: 0.04em;">— Zsu</p>
        </div>
      </div>
    </section>

      a: `<p>If you have a contagious disease or are not feeling well for any other reason, it's best to reschedule for another time so you can get the most out of your treatment and also prevent your therapist from getting ill, too.</p>
          <p>Don't eat at least a couple of hours before treatment. It's not comfortable lying on a full stomach and your body will direct its resources to your digestive system instead of the areas being worked on.</p>
          <p>You won't be treated if you are under the influence of alcohol or drugs, so please arrive sober.</p>
          <p>Arrive on time so you have time to settle before your treatment. If you are feeling rushed, it takes longer to relax.</p>`
    },
    {
      q: 'What should I do during the massage?',
      a: `<p>Always let the therapist know what you would like from the treatment. Tell them where it feels tense, where it hurts. Speak up if you need a different amount of pressure, the temperature is not right in the room or you don't like the music, etc. You will get more out of the treatment this way.</p>
          <p>Some people like to talk during the treatment, while others prefer to remain silent. A good therapist will follow your lead — you should do whatever feels good for you.</p>
          <p>Breathing helps to facilitate relaxation. People tend to hold their breaths when they feel anxious or a painful area is being treated. If you notice that this is happening, remind yourself to start breathing.</p>`
    },
    {
      q: 'How can I get the most out of my treatment?',
      a: `<p>A good treatment will have positive effects for days or weeks to come — and you can make sure that they last as long as possible.</p>
          <p>At the end of the treatment, it's wonderful to remain on the table for a few minutes and feel the massage ripple through your body. Don't get up too fast as you might get lightheaded or dizzy.</p>
          <p>Drink plenty of water or herbal tea to help flush out toxins that got released into your bloodstream. Only eat a light meal if you feel hungry.</p>
          <p>Allow for some quiet time if possible and don't rush back into work or your other engagements. It takes a little while to absorb and integrate the treatment.</p>
          <p>If you feel sore afterwards, try to gently mobilise the area and soak in a warm bath.</p>`
    }
  ];

  return `${siteHeader('faq')}
  <main class="proto-page" data-accent="green">

    <section class="page-stripe" style="background: color-mix(in oklab, var(--c-green) 8%, var(--paper));">
      <div class="leaf-deco" style="right:-60px;top:-30px;width:300px;height:300px;color:var(--c-green);opacity:calc(var(--leaf-op) * .4)">${leafCluster()}</div>
      <div class="shell">
        <div class="eyebrow" style="color: var(--c-green);"><span class="dot"></span>FAQ</div>
        <h1 class="hero__title" style="font-size: clamp(36px, 6.5vw, 72px); margin-top: 18px; max-width: 20ch;">
          Before, during, and after <em>your treatment.</em>
        </h1>
        <p class="lede" style="margin-top: 20px; max-width: 56ch;">
          The most common questions, answered. Anything else, send a note to <a href="mailto:wellbeing@zsutherapy.com" style="border-bottom: 1px solid var(--border);">wellbeing@zsutherapy.com</a>.
        </p>
      </div>

    <section class="section">
      <div class="shell">
        <div class="faq" style="max-width: 800px;">
          ${faqs.map((f, i) => `
            <div class="faq__item ${i === 0 ? 'faq__item--open' : ''}">
              <button class="faq__q" onclick="this.closest('.faq__item').classList.toggle('faq__item--open')">
                <span>${f.q}</span>

    <section class="section" style="background: var(--paper-warm);">

// =============================================================
// ROUTE TABLE
// =============================================================
const SCREENS = {
  'home':                  screenHome,
  'treatments':            screenTreatments,
  'deep-tissue-massage':   screenDeepTissue,
  'aromatherapy-massage':  screenAromatherapy,
  'pregnancy-massage':     screenPregnancy,
  'reflexology':           screenReflexology,
  'thai-yoga-massage':     screenThaiYoga,
  'gift-vouchers':         screenGiftVouchers,
  'book-online':           screenBookOnline,
  'hours-locations':       screenHours,
  'about':                 screenAbout,
  'faq':                   screenFaq
};

window.__SCREENS = SCREENS;

</script>
<script>
/* =============================================================
   Zsu Therapy — Prototype app shell
   - Hash router
   - Tweaks panel (heading font, body font, density, radius, etc.)
   - Logo variant swap
   ============================================================= */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heading_font": "lora",
  "body_font": "dm",
  "warmth": "warm",
  "accent_strategy": "leaf",
  "density": "standard",
  "radius": "soft",
  "leaves": "medium",
  "italics": "on",
  "eyebrows": "on"
}/*EDITMODE-END*/;

const TWEAK_OPTIONS = {
  heading_font: { label: 'Heading font',     options: [['lora','Lora'], ['fraunces','Fraunces'], ['cormorant','Cormorant']] },
  body_font:    { label: 'Body font',        options: [['dm','DM Sans'], ['inter','Inter'], ['atkinson','Atkinson']] },
  warmth:       { label: 'Paper warmth',     options: [['warm','Warm'], ['neutral','Neutral'], ['cool','Cool']] },
  accent_strategy: { label: 'Accent strategy', options: [['rule','Rule'], ['leaf','Rule + leaf'], ['tinted','Tinted block']] },
  density:      { label: 'Density',          options: [['compact','Compact'], ['standard','Standard'], ['airy','Airy']] },
  radius:       { label: 'Corner radius',    options: [['sharp','Sharp'], ['soft','Soft'], ['round','Round']] },
  leaves:       { label: 'Leaf decoration',  options: [['subtle','Subtle'], ['medium','Medium'], ['pronounced','Bold']] },
  italics:      { label: 'Italic accents',   kind: 'toggle' },
  eyebrows:     { label: 'Caps eyebrows',    kind: 'toggle' }
};

// ---- State (read tweaks from localStorage so they persist while clicking around) ----
const STATE_KEY = 'zsu-proto-tweaks-v1';
function readTweaks() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (raw) return { ...TWEAK_DEFAULTS, ...JSON.parse(raw) };
  } catch (e) {}
  return { ...TWEAK_DEFAULTS };
}
function writeTweaks(t) {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(t)); } catch (e) {}
}

let tweaks = readTweaks();
let tweaksOpen = false;

// ---- Apply tweaks to the document root ----
function applyTweaks() {
  const root = document.documentElement;
  for (const key of Object.keys(TWEAK_OPTIONS)) {
    root.setAttribute('data-tweak-' + tweakAttr(key), tweaks[key]);
  }
}
function tweakAttr(key) {
  // Map state-keys to shorter attribute names
  return {
    heading_font: 'heading',
    body_font: 'body',
    warmth: 'warmth',
    accent_strategy: 'accent',
    density: 'density',
    radius: 'radius',
    leaves: 'leaves',
    italics: 'italics',
    eyebrows: 'eyebrows'
  }[key];
}

// ---- Router ----
function currentRoute() {
  const hash = (location.hash || '#home').replace(/^#/, '');
  return SCREENS[hash] ? hash : 'home';
}
function renderRoute() {
  const route = currentRoute();
  const root = document.getElementById('screen-root');
  root.innerHTML = SCREENS[route]();
  applyTweaks();
  // Bind internal links to update hash + scroll-to-top
  root.querySelectorAll('a[href^="#"]').forEach(a => {
    const href = a.getAttribute('href');
    if (href === '#' || href.length < 2) return;
    a.addEventListener('click', (e) => {
      const target = href.slice(1);
      if (SCREENS[target]) {
        e.preventDefault();
        location.hash = '#' + target;
        window.scrollTo({ top: 0, behavior: 'instant' });
      }
    });
  });
  // Inform host (so the design-canvas iframe scrolls to the top of the screen)
  try {
    window.parent && window.parent.postMessage({ slideIndexChanged: routeIndex(route) }, '*');
  } catch (e) {}
}
function routeIndex(route) {
  return Object.keys(SCREENS).indexOf(route);
}

window.addEventListener('hashchange', renderRoute);

// ---- Tweaks panel ----
function buildTweaksPanel() {
  const wrap = document.createElement('div');
  wrap.className = 'tweaks-panel';
  wrap.id = 'tweaks-panel';
  wrap.innerHTML = `
    <h4>
      Tweaks
      <button onclick="window.toggleTweaks()" aria-label="Close">×</button>
    </h4>
    <p class="tweaks-panel__lead">Live preview controls — try the variants the design system page lays out side-by-side.</p>
    <div id="tweaks-body"></div>
  `;
  document.body.appendChild(wrap);

  const body = wrap.querySelector('#tweaks-body');
  for (const [key, def] of Object.entries(TWEAK_OPTIONS)) {
    const section = document.createElement('div');
    section.className = 'tweak-section';
    if (def.kind === 'toggle') {
      section.innerHTML = `
        <div class="tweak-toggle-row">
          <span>${def.label}</span>
          <button class="tweak-switch ${tweaks[key] === 'on' ? 'is-on' : ''}" data-tweak="${key}" aria-pressed="${tweaks[key] === 'on'}"></button>
        </div>
      `;
      section.querySelector('button').addEventListener('click', () => {
        tweaks[key] = tweaks[key] === 'on' ? 'off' : 'on';
        writeTweaks(tweaks);
        section.querySelector('button').classList.toggle('is-on', tweaks[key] === 'on');
        applyTweaks();
      });
    } else {
      section.innerHTML = `
        <span class="tweak-section__label">${def.label}</span>
        <div class="tweak-segments" data-tweak="${key}">
          ${def.options.map(([v, l]) =>
            `<button data-value="${v}" class="${tweaks[key] === v ? 'is-active' : ''}">${l}</button>`
          ).join('')}
        </div>
      `;
      section.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          tweaks[key] = btn.dataset.value;
          writeTweaks(tweaks);
          section.querySelectorAll('button').forEach(b => b.classList.toggle('is-active', b === btn));
          applyTweaks();
        });
      });
    }
    body.appendChild(section);
  }

  // Footer reset
  const footer = document.createElement('div');
  footer.style.cssText = 'margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border-soft); display: flex; gap: 8px; align-items: center;';
  footer.innerHTML = `
    <span style="font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);">${Object.keys(tweaks).length} tweaks</span>
    <span style="flex: 1;"></span>
    <button class="btn btn--quiet" style="font-size: 12px;" onclick="window.resetTweaks()">Reset</button>
  `;
  body.appendChild(footer);
}
function toggleTweaks() {
  tweaksOpen = !tweaksOpen;
  const panel = document.getElementById('tweaks-panel');
  panel.classList.toggle('open', tweaksOpen);
  const toggle = document.getElementById('tweaks-toggle');
  toggle.style.display = tweaksOpen ? 'none' : 'flex';
}
function resetTweaks() {
  tweaks = { ...TWEAK_DEFAULTS };
  writeTweaks(tweaks);
  document.getElementById('tweaks-panel').remove();
  buildTweaksPanel();
  document.getElementById('tweaks-panel').classList.toggle('open', tweaksOpen);
  applyTweaks();
  renderRoute();
}
window.toggleTweaks = toggleTweaks;
window.resetTweaks = resetTweaks;

// ---- Boot ----
function boot() {
  // Tweaks toggle button (always visible)
  const toggle = document.createElement('button');
  toggle.id = 'tweaks-toggle';
  toggle.className = 'tweaks-toggle';
  toggle.title = 'Tweaks';
  toggle.innerHTML = `
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <circle cx="6" cy="6" r="2"/><line x1="6" y1="8" x2="6" y2="20"/>
      <circle cx="12" cy="14" r="2"/><line x1="12" y1="2" x2="12" y2="12"/>
      <circle cx="18" cy="10" r="2"/><line x1="18" y1="12" x2="18" y2="20"/>
    </svg>
  `;
  toggle.addEventListener('click', toggleTweaks);
  document.body.appendChild(toggle);

  buildTweaksPanel();
  applyTweaks();
  renderRoute();
}

document.addEventListener('DOMContentLoaded', boot);

</script>


<script src="../js/zsu-core.js"></script>
<script>ZSU.auth();</script>
